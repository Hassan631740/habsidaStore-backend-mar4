# Application
spring.application.name=habsida-store-backend

# Active profile: local | dev | prod (set in .env as SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Server — Railway injects PORT; fallback to SERVER_PORT then 8080
server.port=${PORT:${SERVER_PORT:8080}}

# DataSource - set in .env (never commit real values)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA - overridden per profile
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT - set JWT_SECRET, JWT_EXPIRATION_MS, JWT_REFRESH_EXPIRATION_MS in .env
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# CORS - optional overrides in .env or profile (cors.allowed-origins, etc.)
# Spring binds cors.* from profile or env

# Pagination: GET list endpoints accept ?page=0&size=20&sort=name,asc (see PageableArgumentResolver)

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
