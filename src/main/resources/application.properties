# Application
spring.application.name=habsida-store-backend

# Server (optional: set in .env)
server.port=${SERVER_PORT:8080}

# DataSource - values from .env or Docker (never commit real .env)
# In Docker, use DATABASE_URL=jdbc:postgresql://postgres:5432/habsida_store
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/habsida_store}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:com.habsida.store.flyway
spring.flyway.baseline-on-migrate=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT (use env JWT_SECRET and JWT_EXPIRATION_MS in production)
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (optional: override in .env or profile)
# cors.allowed-origins=http://localhost:3000,https://app.example.com
# cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
# cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
# cors.allow-credentials=true
# cors.max-age-seconds=3600

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
