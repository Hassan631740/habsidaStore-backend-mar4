# Application
spring.application.name=habsida-store-backend

# Server (optional: set in .env)
server.port=${SERVER_PORT:8080}

# DataSource - values from .env (never commit real .env)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/habsida_store?useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:com.habsida.store.flyway
spring.flyway.baseline-on-migrate=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
