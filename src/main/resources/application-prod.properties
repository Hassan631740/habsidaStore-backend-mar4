# Production profile.
# All secrets MUST come from .env or environment (no defaults).

spring.application.name=habsida-store-backend

# No SQL logging
spring.jpa.show-sql=false
logging.level.com.habsida.store=WARN
logging.level.org.springframework.security=WARN

# CORS - set CORS_ALLOWED_ORIGINS in .env (comma-separated production frontend URLs)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://app.example.com}
cors.allow-credentials=true
cors.max-age-seconds=3600

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
