# Development profile (e.g. shared dev server).
# Sensitive values must be set in .env or environment.

spring.application.name=habsida-store-backend

# Logging
spring.jpa.show-sql=true
logging.level.com.habsida.store=INFO
logging.level.org.springframework.security=INFO

# CORS - adjust origins for your dev frontend URL
cors.allowed-origins=http://localhost:3000,http://localhost:8080,https://dev-your-app.example.com
cors.allow-credentials=true
cors.max-age-seconds=3600

# Swagger enabled in dev
springdoc.swagger-ui.enabled=true
