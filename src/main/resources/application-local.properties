# Local development profile.
# Override in .env if your PostgreSQL uses different credentials (see .env.example).

spring.application.name=habsida-store-backend

# DataSource defaults for local only (override with DATABASE_* in .env)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/habsida_store}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
# Reduce HikariCP "thread starvation or clock leap" warnings when machine sleeps or is idle (housekeeper runs every 2 min)
spring.datasource.hikari.housekeeping-period-ms=120000

# JWT defaults for local only (override with JWT_* in .env)
jwt.secret=${JWT_SECRET:local-dev-secret-at-least-32-characters-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging
spring.jpa.show-sql=true
logging.level.com.habsida.store=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS for local frontend
cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000
cors.allow-credentials=true
cors.max-age-seconds=3600

# Swagger enabled
springdoc.swagger-ui.enabled=true

# Flyway: skip checksum validation locally so edited migration files don't break startup.
# To re-sync checksums after editing a migration: mvn flyway:repair
spring.flyway.validate-on-migrate=false
