# PostgreSQL + Spring Boot app (both run in Docker).
# Usage: docker compose up -d
# App: http://localhost:8080  |  DB: localhost:5432 (user/password from below or .env)

services:
  postgres:
    image: postgres:16-alpine
    container_name: habsida-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habsida_store}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-habsida_store}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: habsida-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-habsida_store}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
