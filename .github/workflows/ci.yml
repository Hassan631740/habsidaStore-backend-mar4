name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: habsida_store
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run all tests
        run: mvn -B verify
        env:
          SPRING_PROFILES_ACTIVE: local
          DATABASE_URL: jdbc:postgresql://localhost:5432/habsida_store
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET: ci-secret-at-least-32-characters-long-for-tests