name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run all tests
        run: mvn -B verify
        env:
          # Testcontainers uses the Docker daemon available on ubuntu-latest runners.
          # Ryuk is enabled by default; no extra config needed.
          SPRING_PROFILES_ACTIVE: local
          JWT_SECRET: ci-secret-at-least-32-characters-long-for-tests
