name: Deploy API Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: habsida_store
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn -B package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: local
          DATABASE_URL: jdbc:postgresql://localhost:5432/habsida_store
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET: docs-secret-at-least-32-characters-long-ok

      - name: Start app
        run: java -jar target/*.jar &
        env:
          SPRING_PROFILES_ACTIVE: local
          DATABASE_URL: jdbc:postgresql://localhost:5432/habsida_store
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          JWT_SECRET: docs-secret-at-least-32-characters-long-ok

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/v3/api-docs > /dev/null && echo "App ready" && break
            echo "Waiting... ($i)"
            sleep 3
          done

      - name: Export OpenAPI spec
        run: curl -s http://localhost:8080/v3/api-docs | python3 -m json.tool > docs/openapi.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
