services:
  - type: web
    name: habsida-store-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: habsida-store-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: habsida-store-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: habsida-store-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: habsida-store-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: habsida-store-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

databases:
  - name: habsida-store-db
    databaseName: habsida_store
    user: habsida_user
    plan: free
